[[patches]]
[patches.pattern]
target = "states/Menu.lua"
pattern = '''self.menuMusicManager:play()'''
position = "before"
payload = '''
if mods.lemontweaks.didINIT == nil then
    math.randomseed(love.timer.getTime() * 100000)
    mods.lemontweaks.nativefs = require("Mods.lemontweaks.assets.dependencies.nativefs")
    cs.menuMusicManager:initCustomPlayer()
    mods.lemontweaks.didINIT = true
end
'''
match_indent = true
